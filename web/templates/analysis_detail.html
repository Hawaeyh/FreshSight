<!doctype html><html><head><meta charset="utf-8"><title>Analysis detail</title><style>body{font:15px Arial;max-width:900px;margin:auto;padding:24px;background:#f4f7f5}table{width:100%;background:white;border-collapse:collapse}td{padding:9px;border-bottom:1px solid #ddd}button{padding:10px;background:#087f5b;color:white;border:0;border-radius:7px}</style></head><body><p><a href="/history">← History</a></p><h1>{{ analysis.original_filename }}</h1><table>{% for key,value in analysis.items() %}<tr><td>{{ key }}</td><td>{{ value if value is not none else 'Not recorded' }}</td></tr>{% endfor %}</table><h2>Explainability</h2><button id="generate">Generate Grad-CAM</button><p id="status"></p><img id="cam" style="max-width:100%;display:none" alt="Grad-CAM overlay"><script>document.getElementById('generate').onclick=async()=>{const s=document.getElementById('status');s.textContent='Generating…';const r=await fetch('/analysis/{{ analysis.analysis_uuid }}/gradcam',{method:'POST'});const d=await r.json();if(r.ok){document.getElementById('cam').src=d.image_url;document.getElementById('cam').style.display='block';s.textContent='Generated from the active model without changing its weights.'}else{s.textContent=d.error}}</script></body></html>
